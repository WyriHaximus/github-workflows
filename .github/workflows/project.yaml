name: Package
on:
  workflow_call:
    inputs:
      dependencyUpdaters:
        description: CSV list of bot AppId's that create PR's to updated dependencies like RenovateBot and DependaBot
        default: 49699333
        required: false
        type: string
      jsonPattern:
        description: The pattern to match which JSON files to check
        default: "\\.json$"
        required: false
        type: string
      workingDirectory:
        description: The directory to run this workflow in
        default: ""
        required: false
        type: string
      services:
        description: Any additional services to use
        default: "{}"
        required: false
        type: string
      env:
        description: Any additional environment variables
        default: "{}"
        required: false
        type: string
      disableMarkdownLinkCheck:
        description: Disable the checking of links in markdown files
        default: false
        required: false
        type: boolean
      disableComposerLockDiff:
        description: Disable the diffing of composer lock files
        default: false
        required: false
        type: boolean
      disableRequiredLabels:
        description: Disable failing PR's when certain labels are missing
        default: false
        required: false
        type: boolean
      runsOnChaos:
        description: Define on which runner to run workflows where order doesn't matter should run
        default: "ubuntu-latest"
        required: false
        type: string
      runsOnChaosUnicorn:
        description: Define on which runner to run workflows where order doesn't matter should run
        default: "ubuntu-slim"
        required: false
        type: string
      runsOnOrder:
        description: Define on which runner to run workflows where order matters should run
        default: "ubuntu-latest"
        required: false
        type: string
      runsOnQASteps:
        description: Define on which runner to run workflows where QA ssteps should run
        default: "ubuntu-latest"
        required: false
        type: string
      dockerfile:
        description: The Dockerfile to build
        default: ""
        required: false
        type: string
      dockerBuildTarget:
        description: Value for the --target flag
        default: ""
        required: false
        type: string
      dockerBuildExtraArguments:
        description: Extra arguments to pass to the docker build command
        required: false
        type: string
      ociPlatforms:
        description: The platforms to build the OCI image for, empty means autodetect
        default: ""
        required: false
        type: string
      ociSpreadBuild:
        description: Spread the build OCI images over different runners
        default: false
        required: false
        type: string
      ociPushSecretSecret:
        description: The secret name that holds the token to push OCI images to GHCR.io
        default: "GITHUB_TOKEN"
        required: false
        type: string
      ociSparseCheckout:
        description: Sparse checkout patterns in cone mode
        default: ""
        required: false
        type: string
      ociRegistry:
        description: The secret name that holds the token to push OCI images to GHCR.io
        default: "ghcr.io"
        required: false
        type: string
      ociPlatformRunnerSuffixMap:
        description: Map that maps the platform to the runner suffix
        default: "{\"linux/arm64\": \"-arm64\", \"linux/amd64\": \"-amd64\"}"
        required: false
        type: string
      markdownLinkCheckSparseCheckout:
        description: Additional files/patterns for the sparse checkout
        default: ""
        required: false
        type: string
jobs:
  ci:
    name: Continuous Integration
    uses: ./.github/workflows/ci.yaml
    with:
      jsonPattern: ${{ inputs.jsonPattern }}
      workingDirectory: ${{ inputs.workingDirectory }}
      services: ${{ inputs.services }}
      env: ${{ inputs.env }}
      isProject: true
      runsOnChaos: ${{ inputs.runsOnChaos }}
      runsOnChaosUnicorn: ${{ inputs.runsOnChaosUnicorn }}
      runsOnOrder: ${{ inputs.runsOnOrder }}
      runsOnQASteps: ${{ inputs.runsOnQASteps }}
  oci-tag:
    name: OCI Tag
    needs:
      - ci
    runs-on: ${{ inputs.runsOnChaos }}
    outputs:
      tag: ${{ steps.lower-case-tag.outputs.tag }}
    steps:
      - name: Tag
        id: lower-case-tag
        run: printf "tag=%s\n" $(echo "${{ github.repository }}:sha-${{ github.sha }}" | tr '[:upper:]' '[:lower:]') >> $GITHUB_OUTPUT
  oci-build-single:
    name: OCI Image Build
    if: inputs.dockerfile != '' && !inputs.ociSpreadBuild
    needs:
      - oci-tag
    uses: ./.github/workflows/oci-build-single.yaml
    secrets: inherit
    with:
      runsOn: ${{ inputs.runsOnChaos }}
      dockerfile: ${{ inputs.dockerfile }}
      dockerBuildTarget: ${{ inputs.dockerBuildTarget }}
      dockerBuildExtraArguments: ${{ inputs.dockerBuildExtraArguments }}
      tag: ${{ needs.oci-tag.outputs.tag }}
      ociPlatforms: ${{ inputs.ociPlatforms }}
      ociPushSecretSecret: ${{ inputs.ociPushSecretSecret }}
      ociSparseCheckout:  ${{ inputs.ociSparseCheckout }}
  oci-build-spread:
    name: OCI Image Build
    if: inputs.dockerfile != '' && inputs.ociSpreadBuild
    needs:
      - oci-tag
    uses: ./.github/workflows/oci-build-spread.yaml
    secrets: inherit
    with:
      runsOn: ${{ inputs.runsOnChaos }}
      dockerfile: ${{ inputs.dockerfile }}
      dockerBuildTarget: ${{ inputs.dockerBuildTarget }}
      dockerBuildExtraArguments: ${{ inputs.dockerBuildExtraArguments }}
      tag: ${{ needs.oci-tag.outputs.tag }}
      ociPlatforms: ${{ inputs.ociPlatforms }}
      ociPushSecretSecret: ${{ inputs.ociPushSecretSecret }}
      ociSparseCheckout:  ${{ inputs.ociSparseCheckout }}
  markdown-link-check:
    name: Check Markdown links
    if: false
#    if: inputs.disableMarkdownLinkCheck == false && github.event_name == 'pull_request'
    uses: ./.github/workflows/markdown-check-links.yaml
    with:
      runsOn: ${{ inputs.runsOnChaosUnicorn }}
      workingDirectory: ${{ inputs.workingDirectory }}
      markdownLinkCheckSparseCheckout: ${{ inputs.markdownLinkCheckSparseCheckout }}
