name: OCI Image Build

on:
  workflow_call:
    inputs:
      runsOn:
        description: Define on which runner this workflow should run
        default: "ubuntu-latest"
        required: false
        type: string
      dockerfile:
        description: The Dockerfile to build
        required: true
        type: string
      dockerBuildTarget:
        description: Value for the --target flag
        default: ""
        required: false
        type: string
      dockerBuildExtraArguments:
        description: Extra arguments to pass to the docker build command
        required: false
        type: string
      tag:
        description: The tag for the image we're building
        required: true
        type: string
      ociPlatforms:
        description: The platforms to build the OCI image for, empty means autodetect
        default: ""
        required: false
        type: string
      ociPushSecretSecret:
        description: The secret name that holds the token to push OCI images to GHCR.io
        default: "GITHUB_TOKEN"
        required: false
        type: string
      ociSparseCheckout:
        description: Sparse checkout patterns in cone mode
        default: ""
        required: false
        type: string
      ociRegistry:
        description: The secret name that holds the token to push OCI images to ghcr.io
        default: "ghcr.io"
        required: false
        type: string
      ociPlatformRunnerSuffixMap:
        description: Map that maps the platform to the runner suffix
        default: "{\"linux/arm64\": \"-arm64\", \"linux/amd64\": \"-amd64\"}"
        required: false
        type: string
jobs:
  supported-platform-matrix:
    name: Supported Platform Matrix
    runs-on: ${{ inputs.runsOn }}
    outputs:
      platform: ${{ steps.supported-platform-matrix.outputs.platform }}
      platform_csv: ${{ steps.supported-platform-matrix.outputs.platform_csv }}
    steps:
      - id: supported-platform-matrix
        name: Generate Arch
        uses: wyrihaximus/github-action-oci-image-supported-platforms@v1.0.0
        with:
          dockerfile: ${{ inputs.dockerfile }}
  oci-build:
    name: OCI Image Build (${{ matrix.platform }})
    runs-on: ${{ inputs.runsOn }}${{ fromJson(inputs.ociPlatformRunnerSuffixMap)[matrix.platform] }}
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJson(needs.supported-platform-matrix.outputs.platform) }}
    needs:
      - supported-platform-matrix
    steps:
      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV
          printf "PLATFORM_ARCH=%s" $(echo "${{ matrix.platform }}" | cut -d "/" -f 2) >> $GITHUB_ENV
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            ${{ inputs.ociSparseCheckout }}
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ inputs.ociRegistry }}
          username: ${{ github.actor }}
          password: ${{ secrets[inputs.ociPushSecretSecret] }}
      - name: Set up QEMU
        if: inputs.runsOn == 'ubuntu-latest'
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - name: Set up QEMU
        if: inputs.runsOn != 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          platforms: ${{ inputs.ociPlatforms != '' && inputs.ociPlatforms || needs.supported-platform-matrix.outputs.platform_csv }}
      - name: Inspect builder
        run: |
          echo "Name:      ${{ steps.buildx.outputs.name }}"
          echo "Endpoint:  ${{ steps.buildx.outputs.endpoint }}"
          echo "Status:    ${{ steps.buildx.outputs.status }}"
          echo "Flags:     ${{ steps.buildx.outputs.flags }}"
          echo "Platforms: ${{ steps.buildx.outputs.platforms }}"
      - run: mkdir -p ./docker-image/
      - run: echo "docker tag ${{ inputs.ociRegistry }}/${{ inputs.tag }}-${{ env.PLATFORM_ARCH }} localhost:5000/${{ inputs.tag }}-${{ env.PLATFORM_ARCH }}" >> ./docker-image/tag-push-${{ env.PLATFORM_PAIR }}.sh
      - run: echo "docker push localhost:5000/${{ inputs.tag }}-${{ env.PLATFORM_ARCH }}" >> ./docker-image/tag-push-${{ env.PLATFORM_PAIR }}.sh
      - name: Build image
        run: docker build --platform=${{ matrix.platform }} -f ${{ inputs.dockerfile }} -t ${{ inputs.ociRegistry }}/${{ inputs.tag }}-${{ env.PLATFORM_ARCH }} --label org.opencontainers.image.revision=${{ github.sha }} --label org.opencontainers.image.source=https://github.com/${{ github.repository }} . ${{ inputs.dockerBuildTarget != '' && format('--target={0}', inputs.dockerBuildTarget) || ''}} ${{ inputs.dockerBuildExtraArguments }}
      - run: docker save ${{ inputs.ociRegistry }}/${{ inputs.tag }}-${{ env.PLATFORM_ARCH }} -o ./docker-image/docker_image-${{ env.PLATFORM_PAIR }}.tar
      - name: Upload Images
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: docker-image-${{ github.sha }}-${{ env.PLATFORM_PAIR }}
          path: ./docker-image
  oci-merge-and-push:
    name: OCI Combine and Push
    needs:
      - oci-build
      - supported-platform-matrix
    runs-on: ${{ inputs.runsOn }}
    services:
      registry:
        image: registry:3
        ports:
          - 5000:5000
    steps:
      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV
          printf "PLATFORM_ARCH=%s" $(echo "${{ matrix.platform }}" | cut -d "/" -f 2) >> $GITHUB_ENV
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ inputs.ociRegistry }}
          username: ${{ github.actor }}
          password: ${{ secrets[inputs.ociPushSecretSecret] }}
      - name: Set up QEMU
        if: inputs.runsOn == 'ubuntu-latest'
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - name: Set up QEMU
        if: inputs.runsOn != 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          driver-opts: network=host
          platforms: ${{ inputs.ociPlatforms != '' && inputs.ociPlatforms || steps.platform.outputs.platform_csv }}
      - name: Inspect builder
        run: |
          echo "Name:      ${{ steps.buildx.outputs.name }}"
          echo "Endpoint:  ${{ steps.buildx.outputs.endpoint }}"
          echo "Status:    ${{ steps.buildx.outputs.status }}"
          echo "Flags:     ${{ steps.buildx.outputs.flags }}"
          echo "Platforms: ${{ steps.buildx.outputs.platforms }}"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: docker-image-${{ github.sha }}-*
          path: /tmp/docker-image
          merge-multiple: true
      - run: |
          for f in /tmp/docker-image/docker_image-*.tar; do
            docker load --input $f
          done
      - run: docker images
      - run: cat /tmp/docker-image/tag-push-*.sh | sh
      - run: echo "FROM localhost:5000/${{ inputs.tag }}-\${TARGETARCH}" >> docker-file-push
      - run: docker build -f docker-file-push -t ${{ inputs.ociRegistry }}/${{ inputs.tag }} --platform=${{ needs.supported-platform-matrix.outputs.platform_csv }} --label org.opencontainers.image.revision=${{ github.sha }} --label org.opencontainers.image.source=https://github.com/${{ github.repository }} --output=type=registry .
